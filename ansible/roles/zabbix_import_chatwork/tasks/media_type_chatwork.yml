---
# Create Chatwork webhook media type using community.zabbix module
- name: Load Chatwork webhook configuration from YAML
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/../templates/media/chatwork/media_chatwork.yaml"
  register: chatwork_yaml_file

- name: Extract webhook configuration
  ansible.builtin.set_fact:
    chatwork_mediatype_config: "{{ (chatwork_yaml_file['content'] | b64decode | from_yaml).zabbix_export.media_types[0] }}"

- name: Create Chatwork webhook media type
  community.zabbix.zabbix_mediatype:
    name: "{{ chatwork_mediatype_config.name }}"
    type: webhook
    webhook_script: "{{ chatwork_mediatype_config.script }}"
    webhook_params: "{{ chatwork_mediatype_config.parameters }}"
    state: present
  register: chatwork_mediatype_result
  changed_when: chatwork_mediatype_result.changed

- name: Debug media type creation result
  debug:
    msg: "Chatwork media type {{ 'created' if chatwork_mediatype_result.changed else 'already exists' }}"

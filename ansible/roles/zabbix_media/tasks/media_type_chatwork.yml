---
# Import Chatwork webhook media type using community.zabbix module
- name: Load Chatwork webhook configuration from YAML file
  ansible.builtin.slurp:
    src: "{{ role_path }}/templates/media_chatwork.yaml"
  register: chatwork_yaml_file

- name: Substitute token and extract webhook configuration
  ansible.builtin.set_fact:
    chatwork_mediatype_config: "{{ (chatwork_yaml_file['content'] | b64decode | regex_replace('\\{\\{ lookup\\(\"env\", \"CHATWORK_TOKEN\"\\) \\}\\}', lookup('env', 'CHATWORK_TOKEN')) | from_yaml).zabbix_export.media_types[0] }}"

- name: Check if Chatwork media type already exists
  uri:
    url: "{{ lookup('env', 'ZABBIX_URL') }}"
    method: POST
    headers:
      Content-Type: application/json-rpc
      Authorization: "Bearer {{ lookup('env', 'ZABBIX_API_TOKEN') }}"
    body_format: json
    body:
      jsonrpc: "2.0"
      method: "mediatype.get"
      params:
        filter:
          name: "Chatwork"
      id: 1
  register: chatwork_check_result

- name: Import Chatwork webhook media type
  community.zabbix.zabbix_mediatype:
    name: "{{ chatwork_mediatype_config.name }}"
    type: webhook
    webhook_script: "{{ chatwork_mediatype_config.script }}"
    webhook_params: "{{ chatwork_mediatype_config.parameters }}"
    state: present
    status: "enabled"
  register: chatwork_mediatype_result
  when: chatwork_check_result.json.result | length == 0

- name: Display media type import result
  debug:
    msg: "Chatwork media type {{ 'created' if chatwork_mediatype_result.changed else 'already exists' }}"

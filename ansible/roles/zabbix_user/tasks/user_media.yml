---
# Add media (notification methods) to user tk
# Note: Media configuration for Zabbix 7.4 requires a different API approach
# In Zabbix 7.4, media types are created separately (zabbix_media role)
#d User media linkage requires investigation of the correct API method/parameters

- name: Configure user tk with media
  community.zabbix.zabbix_user:
    username: "tk"
    usrgrps:
      - "Zabbix administrators"
    passwd: "{{ lookup('env', 'ZABBIX_USER_PASSWORD') }}"
    role_name: "Super admin role"
    user_medias:
      - mediatype: "Chatwork"
        sendto: "321771680"
        period: "1-7,00:00-24:00"
      - mediatype: "Slack"
        sendto: "alert"
        period: "1-7,00:00-24:00"
